<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#e8654a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧒</text></svg>">
  <meta name="description" content="童病记 - 以病程为核心的儿童健康记录工具">
  <title>童病记</title>
<style>
:root {
  --primary: #e8654a;
  --primary-light: #f0846e;
  --primary-dark: #d14e33;
  --primary-bg: rgba(232,101,74,0.08);
  --bg: #ffffff;
  --bg-secondary: #f8f9fa;
  --border: #e9ecef;
  --text: #212529;
  --text-secondary: #6c757d;
  --text-light: #adb5bd;
  --danger: #dc3545;
  --success: #28a745;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --color-symptom: #f59e0b;
  --color-temp-hot: #ef4444;
  --color-temp-normal: #10b981;
  --color-visit: #3b82f6;
  --color-checkup: #8b5cf6;
  --color-med: #10b981;
  --color-recovered: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; touch-action:manipulation; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5;
}

.app-container { display:flex; flex-direction:column; height:100vh; height:100dvh; }

.page-content {
  flex:1; min-height:0; -webkit-overflow-scrolling:touch;
  overflow-y:auto; overflow-x:hidden;
  padding-bottom: calc(70px + var(--safe-bottom));
  background: var(--bg);
}

.page-header { padding:20px 20px 16px; background:var(--bg); position:sticky; top:0; z-index:10; }
.page-title { font-size:28px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
.page-subtitle { font-size:14px; color:var(--text-secondary); margin-top:4px; }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; display:flex;
  background:var(--bg); border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom); z-index:100;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 0; color:var(--text-light); text-decoration:none;
  font-size:11px; transition:color 0.2s; cursor:pointer; border:none; background:none;
}
.nav-item.active { color:var(--primary); }
.nav-item svg { width:24px; height:24px; margin-bottom:4px; }
.nav-item span { font-weight:500; }

/* Illness Card */
.illness-card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin:0 16px 12px; cursor:pointer; transition:transform 0.15s;
}
.illness-card:active { transform:scale(0.98); }
.illness-card.recovered { opacity:0.65; }
.illness-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.illness-card-title { font-size:17px; font-weight:600; color:var(--text); flex:1; margin-right:8px; }
.illness-card-dates { font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.illness-card-summary { font-size:13px; color:var(--text-secondary); display:flex; gap:12px; flex-wrap:wrap; }

.status-tag {
  font-size:12px; padding:3px 10px; border-radius:20px; font-weight:500; white-space:nowrap;
}
.status-tag.ongoing { background:rgba(232,101,74,0.12); color:var(--primary); }
.status-tag.recovered { background:rgba(40,167,69,0.1); color:var(--success); }

/* FAB */
.fab {
  position:fixed; bottom:calc(80px + var(--safe-bottom)); right:20px;
  width:56px; height:56px; border-radius:50%; background:var(--primary);
  color:white; border:none; cursor:pointer; display:flex; align-items:center;
  justify-content:center; box-shadow:0 4px 16px rgba(232,101,74,0.4);
  transition:all 0.2s; z-index:50;
}
.fab:active { transform:scale(0.92); }
.fab svg { width:28px; height:28px; }

/* Search */
.search-bar {
  display:flex; align-items:center; gap:10px; padding:0 16px 16px;
}
.search-input-wrap {
  flex:1; position:relative; display:flex; align-items:center;
}
.search-input-wrap svg { position:absolute; left:14px; color:var(--text-light); width:18px; height:18px; pointer-events:none; }
.search-input {
  width:100%; padding:12px 16px 12px 42px; border:1px solid var(--border);
  border-radius:24px; font-size:15px; background:var(--bg-secondary);
  color:var(--text); transition:border-color 0.15s;
}
.search-input:focus { outline:none; border-color:var(--primary); background:var(--bg); }
.search-input::placeholder { color:var(--text-light); }

.search-result-item {
  display:flex; align-items:center; padding:12px 16px; border-radius:var(--radius-sm);
  cursor:pointer; transition:background 0.1s; gap:12px; margin:0 16px 4px;
}
.search-result-item:active { background:var(--bg-secondary); }
.search-result-icon {
  width:36px; height:36px; border-radius:10px; display:flex;
  align-items:center; justify-content:center; flex-shrink:0; font-size:18px;
}
.search-result-content { flex:1; min-width:0; }
.search-result-title { font-size:15px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.search-result-meta { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.search-highlight { background:#ffeaa7; padding:0 2px; border-radius:2px; }

/* Timeline */
.timeline-container { padding:0 16px 16px; }
.timeline-day { margin-bottom:4px; }
.timeline-day-header {
  font-size:13px; font-weight:600; color:var(--text-secondary);
  padding:8px 0 6px 24px; position:relative;
}
.timeline-day-header::before {
  content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:8px; height:8px; border-radius:50%; background:var(--border);
}

.timeline-line { position:relative; padding-left:24px; }
.timeline-line::before {
  content:''; position:absolute; left:3px; top:0; bottom:0;
  width:2px; background:var(--border);
}

.timeline-event {
  position:relative; padding:8px 12px 12px 0; cursor:pointer;
}
.timeline-event:active { opacity:0.7; }
.timeline-event::before {
  content:''; position:absolute; left:-24px; top:14px;
  width:10px; height:10px; border-radius:50%;
  border:2px solid var(--bg); z-index:1;
}
.timeline-event.symptom::before { background:var(--color-symptom); }
.timeline-event.temperature::before { background:var(--color-temp-normal); }
.timeline-event.temperature.fever::before { background:var(--color-temp-hot); }
.timeline-event.visit::before { background:var(--color-visit); }
.timeline-event.checkup::before { background:var(--color-checkup); }
.timeline-event.medication::before { background:var(--color-med); }
.timeline-event.recovery::before { background:var(--color-recovered); }

.timeline-event-icon {
  display:inline-flex; align-items:center; gap:6px; font-size:15px; font-weight:600;
  margin-bottom:2px;
}
.timeline-event-time {
  font-size:12px; color:var(--text-light); float:right; margin-top:3px;
}
.timeline-event-detail { font-size:13px; color:var(--text-secondary); margin-top:2px; }
.timeline-event-photos { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.timeline-event-photos img {
  width:56px; height:56px; border-radius:6px; object-fit:cover; border:1px solid var(--border);
  cursor:pointer;
}
.temp-highlight { color:var(--color-temp-hot); font-weight:700; }
.temp-normal-val { color:var(--color-temp-normal); font-weight:600; }

/* Illness Detail Header */
.detail-header {
  padding:20px; background:var(--bg); border-bottom:1px solid var(--border);
}
.detail-header-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.detail-back {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border:none; background:var(--bg-secondary); color:var(--text); cursor:pointer;
  border-radius:50%; font-size:20px; flex-shrink:0;
}
.detail-back:active { background:var(--border); }
.detail-title-area { flex:1; }
.detail-title { font-size:22px; font-weight:700; }
.detail-meta { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:14px; color:var(--text-secondary); }
.detail-actions { display:flex; gap:8px; margin-top:12px; }

/* Add Event Button */
.add-event-bar {
  position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--border);
  padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); display:flex; gap:8px;
}
.add-event-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 8px; border-radius:var(--radius-sm); font-size:13px; font-weight:600;
  border:1px solid var(--border); background:var(--bg); color:var(--text-secondary);
  cursor:pointer; transition:all 0.15s;
}
.add-event-btn:active { background:var(--bg-secondary); border-color:var(--primary); color:var(--primary); }
.add-event-btn .evt-icon { font-size:16px; }

/* Event Type Selector */
.event-type-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:12px; padding:16px;
}
.event-type-option {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:16px 8px; border-radius:var(--radius); background:var(--bg-secondary);
  border:none; cursor:pointer; transition:all 0.15s;
}
.event-type-option:active { transform:scale(0.95); }
.event-type-option .evt-emoji { font-size:24px; }
.event-type-option .evt-label { font-size:13px; font-weight:500; color:var(--text); }

/* Form */
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:14px; font-weight:600; color:var(--text); margin-bottom:8px; }
.form-input {
  width:100%; padding:14px 16px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:16px; background:var(--bg);
  color:var(--text); transition:border-color 0.15s;
}
.form-input:focus { outline:none; border-color:var(--primary); }
.form-input::placeholder { color:var(--text-light); }
textarea.form-input { resize:vertical; min-height:80px; }
.form-hint { font-size:12px; color:var(--text-secondary); margin-top:6px; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }

.select-wrapper { position:relative; }
.form-select {
  width:100%; padding:14px 40px 14px 16px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:16px; background:var(--bg);
  color:var(--text); appearance:none; cursor:pointer;
}
.form-select:focus { outline:none; border-color:var(--primary); }
.select-arrow { position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--text-secondary); }

/* Severity Stars */
.severity-stars { display:flex; gap:8px; }
.severity-star {
  width:36px; height:36px; border-radius:50%; border:2px solid var(--border);
  background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:all 0.15s;
}
.severity-star.active { border-color:var(--primary); background:var(--primary-bg); }
.severity-star.active::after { content:'★'; color:var(--primary); }
.severity-star:not(.active)::after { content:'☆'; color:var(--text-light); }

/* Photo */
.photo-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.photo-thumb {
  width:80px; height:80px; border-radius:var(--radius-sm); object-fit:cover;
  border:1px solid var(--border); cursor:pointer; transition:transform 0.15s; position:relative;
}
.photo-thumb:active { transform:scale(0.95); }
.photo-add {
  width:80px; height:80px; border-radius:var(--radius-sm);
  border:2px dashed var(--border); display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer;
  color:var(--text-light); font-size:12px; transition:all 0.15s; background:none;
}
.photo-add:active { border-color:var(--primary); color:var(--primary); }
.photo-add svg { width:24px; height:24px; margin-bottom:2px; }
.photo-delete {
  position:absolute; top:-6px; right:-6px; width:22px; height:22px;
  border-radius:50%; background:var(--danger); color:white; border:2px solid var(--bg);
  font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  line-height:1; padding:0;
}

/* Photo Viewer */
.photo-viewer {
  position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:300;
  display:none; align-items:center; justify-content:center; flex-direction:column;
}
.photo-viewer.show { display:flex; }
.photo-viewer img { max-width:95%; max-height:85vh; object-fit:contain; border-radius:8px; }
.photo-viewer-close {
  position:absolute; top:16px; right:16px; width:40px; height:40px;
  border-radius:50%; background:rgba(255,255,255,0.2); border:none;
  color:white; font-size:24px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
}

/* Modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:200; opacity:0; visibility:hidden; transition:all 0.25s;
}
.modal-overlay.show { opacity:1; visibility:visible; }
.modal {
  background:var(--bg); border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
  transform:translateY(100%); transition:transform 0.25s ease-out;
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg); z-index:1;
}
.modal-title { font-size:18px; font-weight:600; }
.modal-close {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border:none; background:none; color:var(--text-secondary); cursor:pointer;
  border-radius:50%; transition:background 0.1s; font-size:20px;
}
.modal-close:active { background:var(--bg-secondary); }
.modal-body { padding:20px; }
.modal-footer {
  padding:16px 20px; padding-bottom:calc(16px + var(--safe-bottom));
  border-top:1px solid var(--border); display:flex; gap:12px;
}
.modal-footer .btn { flex:1; }

/* Full page modal */
.full-modal {
  position:fixed; inset:0; background:var(--bg); z-index:150;
  display:none; flex-direction:column;
}
.full-modal.show { display:flex; }
.full-modal-header {
  display:flex; align-items:center; padding:12px 16px;
  border-bottom:1px solid var(--border); gap:12px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
}
.full-modal-back {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border:none; background:none; color:var(--text); cursor:pointer;
  border-radius:50%; font-size:20px;
}
.full-modal-back:active { background:var(--bg-secondary); }
.full-modal-title { font-size:17px; font-weight:600; flex:1; }
.full-modal-body { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }

/* Button */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 20px; border-radius:var(--radius-sm); font-size:15px; font-weight:600;
  border:none; cursor:pointer; transition:all 0.15s; text-decoration:none; min-height:48px;
}
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-primary:active { transform:scale(0.97); }
.btn-secondary { background:var(--bg-secondary); color:var(--text); border:1px solid var(--border); }
.btn-ghost { background:transparent; color:var(--primary); padding:8px 12px; min-height:auto; }
.btn-danger { background:var(--danger); color:white; }
.btn-block { width:100%; }
.btn-sm { padding:8px 14px; font-size:13px; min-height:36px; }

/* Empty State */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 30px; text-align:center;
}
.empty-icon { width:80px; height:80px; margin-bottom:20px; color:var(--text-light); }
.empty-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:8px; }
.empty-desc { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }

/* Vaccine */
.vaccine-presets { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.vaccine-preset {
  padding:6px 14px; border-radius:20px; font-size:13px;
  background:var(--bg-secondary); color:var(--text-secondary);
  border:1px solid var(--border); cursor:pointer; transition:all 0.15s;
}
.vaccine-preset:active { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }

.vaccine-card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; margin:0 16px 10px; cursor:pointer; transition:transform 0.15s;
}
.vaccine-card:active { transform:scale(0.98); }
.vaccine-card-title { font-size:15px; font-weight:600; }
.vaccine-card-meta { font-size:13px; color:var(--text-secondary); margin-top:2px; }

/* Config */
.config-avatar {
  width:80px; height:80px; border-radius:50%; background:var(--primary-bg);
  display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
  font-size:40px;
}

/* Temp display */
.temp-value-display { font-size:48px; font-weight:700; text-align:center; padding:20px; }
.temp-normal { color:var(--success); }
.temp-fever { color:var(--danger); }

/* Toast */
.toast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-100px);
  background:var(--text); color:white; padding:12px 24px; border-radius:24px;
  font-size:14px; font-weight:500; z-index:500; opacity:0;
  transition:all 0.3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Scrollbar */
.page-content::-webkit-scrollbar { width:0; }
.full-modal-body::-webkit-scrollbar { width:0; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease-out; }
</style>
</head>
<body>

<div class="app-container">
  <div id="page-home" class="page-content"></div>
  <div id="page-vaccine" class="page-content" style="display:none"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4h4v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
      <span>病程</span>
    </button>
    <button class="nav-item" data-page="vaccine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>疫苗</span>
    </button>
  </nav>
</div>

<!-- Illness Detail Page -->
<div id="illness-detail" class="full-modal">
  <div class="full-modal-header">
    <button class="full-modal-back" onclick="closeIllnessDetail()">&larr;</button>
    <div class="full-modal-title" id="detail-title"></div>
    <button class="btn btn-ghost btn-sm" onclick="showIllnessConfig()">编辑</button>
  </div>
  <div class="full-modal-body" id="detail-body"></div>
  <div class="add-event-bar" id="add-event-bar"></div>
</div>

<!-- Full Modal for Forms -->
<div id="full-modal" class="full-modal">
  <div class="full-modal-header">
    <button class="full-modal-back" onclick="closeFullModal()">&larr;</button>
    <div class="full-modal-title" id="full-modal-title"></div>
    <button class="btn btn-sm btn-danger" id="full-modal-delete" style="display:none" onclick="deleteCurrentRecord()">删除</button>
  </div>
  <div class="full-modal-body" id="full-modal-body"></div>
</div>

<!-- Modal Overlay for event type selector etc -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<!-- Photo Viewer -->
<div id="photo-viewer" class="photo-viewer" onclick="closePhotoViewer()">
  <button class="photo-viewer-close">&times;</button>
  <img id="photo-viewer-img" src="" alt="">
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Hidden file input -->
<input type="file" id="photo-file-input" accept="image/*" multiple style="display:none">

<script>
// ==================== Utility ====================
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,9); }

function parseLocalDatetime(dtStr) {
  if (!dtStr) return new Date();
  const s = dtStr.replace('T',' ');
  const [d,t] = s.split(' ');
  const [y,m,day] = d.split('-').map(Number);
  const [h,min] = (t||'00:00').split(':').map(Number);
  return new Date(y, m-1, day, h||0, min||0);
}

function formatDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${dt.getMonth()+1}.${dt.getDate()}`;
}

function formatDatetime(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${formatDate(dt)} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function formatTime(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function formatRelative(d) {
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  const now = new Date();
  const diff = now - dt;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 7) return `${days}天前`;
  if (days < 30) return `${Math.floor(days/7)}周前`;
  return formatDate(dt);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function nowISO() {
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+'T'+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function todayISO() {
  return formatDate(new Date());
}

// ==================== IndexedDB ====================
const DB_NAME = 'child_health_db';
const DB_VERSION = 2;

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      // New stores for v2
      const storeDefs = {
        illnesses: { keyPath:'id', indexes:[['createdAt','createdAt'],['status','status']] },
        events: { keyPath:'id', indexes:[['illnessId','illnessId'],['eventType','eventType'],['timestamp','timestamp'],['createdAt','createdAt']] },
        photos: { keyPath:'id', indexes:[['eventId','eventId']] },
        vaccines: { keyPath:'id', indexes:[['createdAt','createdAt']] }
      };
      for (const [name, def] of Object.entries(storeDefs)) {
        let store;
        if (!database.objectStoreNames.contains(name)) {
          store = database.createObjectStore(name, { keyPath: def.keyPath });
        } else {
          store = e.target.transaction.objectStore(name);
        }
        if (def.indexes) {
          for (const [idxName, idxKey] of def.indexes) {
            if (!store.indexNames.contains(idxName)) {
              store.createIndex(idxName, idxKey);
            }
          }
        }
      }
      // Keep old stores if they exist (for migration)
      const oldStores = ['visits','symptoms','temperatures','checkups','medications'];
      for (const name of oldStores) {
        if (!database.objectStoreNames.contains(name)) {
          database.createObjectStore(name, { keyPath:'id' });
        }
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.getAll(value);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// ==================== Photo Handling ====================
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function savePhoto(eventId, file) {
  const full = await compressImage(file, 1200, 0.8);
  const thumb = await compressImage(file, 200, 0.6);
  const photo = { id: genId(), eventId, data: full, thumbnail: thumb, createdAt: new Date().toISOString() };
  await dbPut('photos', photo);
  return photo.id;
}

async function deletePhotosForEvent(eventId) {

}

let pendingPhotos = [];

function triggerPhotoInput() {
  document.getElementById('photo-file-input').click();
}

document.getElementById('photo-file-input').addEventListener('change', async function(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  for (const file of files) {
    if (pendingPhotos.length >= 10) break;
    const thumb = await compressImage(file, 200, 0.6);
    const full = await compressImage(file, 1200, 0.8);
    pendingPhotos.push({ file, thumb, full });
  }
  e.target.value = '';
  renderPhotoPreview();
});

function renderPhotoPreview() {
  const container = document.getElementById('photo-preview-area');
  if (!container) return;
  let html = '<div class="photo-grid">';
  pendingPhotos.forEach((p, i) => {
    html += `<div style="position:relative;display:inline-block">
      <img class="photo-thumb" src="${p.thumb}" onclick="viewPhoto('${p.full.replace(/'/g,"\\'")}')">
      <button class="photo-delete" onclick="event.stopPropagation();removePendingPhoto(${i})">&times;</button>
    </div>`;
  });
  if (pendingPhotos.length < 10) {
    html += `<button class="photo-add" onclick="triggerPhotoInput()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      添加</button>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function removePendingPhoto(idx) {
  pendingPhotos.splice(idx, 1);
  renderPhotoPreview();
}

async function getIllnessTitle(ill) {
  if (ill.title) return ill.title;
  // Auto-generate: try diagnosis from visit events
  const events = await dbGetByIndex('events', 'illnessId', ill.id);
  const visitEvent = events.find(e => e.eventType === 'visit' && e.data.diagnosis);
  if (visitEvent) return visitEvent.data.diagnosis;
  // Try first symptom
  const symptomEvent = events.find(e => e.eventType === 'symptom' && e.data.name);
  if (symptomEvent) {
    const start = parseLocalDatetime(ill.startDate);
    const now = ill.status === 'recovered' && ill.endDate ? parseLocalDatetime(ill.endDate) : new Date();
    const days = Math.max(1, Math.ceil((now - start) / 86400000));
    return symptomEvent.data.name + days + '天';
  }
  return '未命名病程';
}

async function getIllnessCounts(illnessId) {
  const events = await dbGetByIndex('events', 'illnessId', illnessId);
  return {
    visits: events.filter(e => e.eventType === 'visit').length,
    meds: events.filter(e => e.eventType === 'medication').length,
    checkups: events.filter(e => e.eventType === 'checkup').length,
    symptoms: events.filter(e => e.eventType === 'symptom').length,
    temps: events.filter(e => e.eventType === 'temperature').length,
  };
}

// ==================== Search ====================
let homeSearchTimer = null;
function debounceHomeSearch() {
  clearTimeout(homeSearchTimer);
  homeSearchTimer = setTimeout(() => doHomeSearch(), 400);
}

async function doHomeSearch() {
  const keyword = document.getElementById('home-search-input')?.value.trim();
  const resultsContainer = document.getElementById('home-search-results');
  const listContainer = document.getElementById('illness-list');

  if (!keyword) {
    resultsContainer.innerHTML = '';
    listContainer.style.display = '';
    return;
  }

  addSearchHistory(keyword);
  listContainer.style.display = 'none';

  const kw = keyword.toLowerCase();
  const results = [];

  // Search events
  const allEvents = await dbGetAll('events');
  const allIllnesses = await dbGetAll('illnesses');
  const illnessMap = {};
  allIllnesses.forEach(i => illnessMap[i.id] = i);

  for (const ev of allEvents) {
    let match = false;
    let summary = '';
    switch(ev.eventType) {
      case 'symptom':
        match = [ev.data.name, ev.data.notes].filter(Boolean).join(' ').toLowerCase().includes(kw);
        summary = ev.data.name;
        break;
      case 'temperature':
        const val = String(ev.data.value);
        match = val.includes(kw) || (ev.data.notes||'').toLowerCase().includes(kw);
        summary = ev.data.value + '°C';
        break;
      case 'visit':
        match = [ev.data.diagnosis, ev.data.hospital, ev.data.department, ev.data.doctor, ev.data.notes].filter(Boolean).join(' ').toLowerCase().includes(kw);
        summary = ev.data.diagnosis || ev.data.hospital || '就诊';
        break;
      case 'checkup':
        match = [ev.data.type, ev.data.details, ev.data.hospital].filter(Boolean).join(' ').toLowerCase().includes(kw);
        summary = ev.data.type + (ev.data.details ? ': ' + ev.data.details.substring(0,30) : '');
        break;
      case 'medication':
        match = [ev.data.name, ev.data.dosage, ev.data.frequency, ev.data.sideEffects].filter(Boolean).join(' ').toLowerCase().includes(kw);
        summary = ev.data.name + ' ' + (ev.data.dosage||'');
        break;
    }
    if (match) {
      const ill = illnessMap[ev.illnessId];
      const illTitle = ill ? (ill.title || await getIllnessTitle(ill)) : '未知病程';
      const emoji = {symptom:'😷',temperature:'🌡️',visit:'🏥',checkup:'📋',medication:'💊'}[ev.eventType] || '📝';
      results.push({
        illnessId: ev.illnessId,
        illTitle,
        emoji,
        summary: highlightText(summary, keyword),
        time: formatDatetime(ev.timestamp)
      });
    }
  }

  // Also search vaccines
  const vaccines = await dbGetAll('vaccines');
  for (const v of vaccines) {
    if ([v.name, v.hospital, v.notes].filter(Boolean).join(' ').toLowerCase().includes(kw)) {
      results.push({
        illnessId: null,
        illTitle: '疫苗记录',
        emoji: '💉',
        summary: highlightText(v.name, keyword),
        time: formatDate(v.date)
      });
    }
  }

  if (results.length === 0) {
    resultsContainer.innerHTML = `<div class="empty-state" style="padding:40px"><div class="empty-desc">未找到相关记录</div></div>`;
  } else {
    let html = '';
    results.forEach(r => {
      const onclick = r.illnessId ? `openIllnessDetail('${r.illnessId}')` : '';
      html += `<div class="search-result-item" onclick="${onclick}">
        <div class="search-result-icon" style="background:var(--bg-secondary);font-size:20px;">${r.emoji}</div>
        <div class="search-result-content">
          <div class="search-result-title">${r.summary}</div>
          <div class="search-result-meta">${r.illTitle} · ${r.time}</div>
        </div>
      </div>`;
    });
    resultsContainer.innerHTML = html;
  }
}

function highlightText(text, keyword) {
  if (!keyword || !text) return text;
  const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(regex, '<span class="search-highlight">$1</span>');
}

async function renderIllnessDetail(illnessId) {
  const ill = await dbGet('illnesses', illnessId);
  if (!ill) { closeIllnessDetail(); return; }

  const title = await getIllnessTitle(ill);
  document.getElementById('detail-title').textContent = title;

  const events = (await dbGetByIndex('events', 'illnessId', illnessId))
    .sort((a,b) => b.timestamp.localeCompare(a.timestamp));

  let bodyHTML = '';

  // Detail header info
  const dateRange = formatDateShort(ill.startDate) + (ill.endDate ? ' - ' + formatDateShort(ill.endDate) : ' - 进行中');
  bodyHTML += `<div class="detail-header" style="margin:-20px -20px 0;padding:20px;border-bottom:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:20px;font-weight:700;">${title}</span>
      <span class="status-tag ${ill.status}">${ill.status==='recovered'?'已康复':'进行中'}</span>
    </div>
    <div style="font-size:14px;color:var(--text-secondary);">${dateRange}</div>
  </div>`;

  // Timeline
  if (events.length === 0) {
    bodyHTML += `<div class="empty-state" style="padding:60px 20px">
      <div class="empty-desc">还没有记录，点击下方按钮添加事件</div>
    </div>`;
  } else {
    // Group by date
    const groups = {};
    for (const ev of events) {
      const dt = parseLocalDatetime(ev.timestamp);
      const dayKey = formatDate(dt);
      if (!groups[dayKey]) groups[dayKey] = [];
      groups[dayKey].push(ev);
    }

    // Sort days descending
    const sortedDays = Object.keys(groups).sort((a,b) => b.localeCompare(a));

    bodyHTML += '<div class="timeline-container" style="padding-top:16px;">';
    for (const day of sortedDays) {
      const dt = parseLocalDatetime(day);
      const weekday = ['日','一','二','三','四','五','六'][dt.getDay()];
      bodyHTML += `<div class="timeline-day">
        <div class="timeline-day-header">${dt.getMonth()+1}月${dt.getDate()}日 周${weekday}</div>
        <div class="timeline-line">`;

      // Sort events within day by timestamp descending
      const dayEvents = groups[day].sort((a,b) => b.timestamp.localeCompare(a.timestamp));

      for (const ev of dayEvents) {
        bodyHTML += await renderTimelineEvent(ev);
      }

      bodyHTML += '</div></div>';
    }
    bodyHTML += '</div>';
  }

  document.getElementById('detail-body').innerHTML = bodyHTML;

  // Add event bar
  document.getElementById('add-event-bar').innerHTML = `
    <button class="add-event-btn" onclick="openEventForm('symptom')"><span class="evt-icon">😷</span>记症状</button>
    <button class="add-event-btn" onclick="openEventForm('temperature')"><span class="evt-icon">🌡️</span>记体温</button>
    <button class="add-event-btn" onclick="openEventForm('visit')"><span class="evt-icon">🏥</span>记就诊</button>
    <button class="add-event-btn" onclick="openEventForm('checkup')"><span class="evt-icon">📋</span>记检查</button>
    <button class="add-event-btn" onclick="openEventForm('medication')"><span class="evt-icon">💊</span>记用药</button>
  `;
}

async function renderTimelineEvent(ev) {
  const time = formatTime(ev.timestamp);
  let icon = '', cls = ev.eventType, detail = '', isFever = false;

  switch(ev.eventType) {
    case 'symptom':
      icon = '😷';
      const stars = '★'.repeat(ev.data.severity||0) + '☆'.repeat(5-(ev.data.severity||0));
      detail = ev.data.notes ? `<div class="timeline-event-detail">${ev.data.name} <span style="color:var(--primary);font-size:12px">${stars}</span>${ev.data.notes ? ' · '+ev.data.notes : ''}</div>` :
        `<div class="timeline-event-detail">${ev.data.name} <span style="color:var(--primary);font-size:12px">${stars}</span></div>`;
      break;
    case 'temperature':
      isFever = ev.data.value >= 37.3;
      icon = '🌡️';
      cls = isFever ? 'temperature fever' : 'temperature';
      const tempCls = isFever ? 'temp-highlight' : 'temp-normal-val';
      detail = `<div class="timeline-event-detail"><span class="${tempCls}">${ev.data.value}°C</span>${ev.data.notes ? ' · '+ev.data.notes : ''}</div>`;
      break;
    case 'visit':
      icon = '🏥';
      detail = `<div style="font-size:14px;font-weight:500;">${ev.data.hospital||'就诊'} ${ev.data.department?'· '+ev.data.department:''}</div>`;
      if (ev.data.diagnosis) detail += `<div class="timeline-event-detail">诊断：${ev.data.diagnosis}</div>`;
      if (ev.data.notes) detail += `<div class="timeline-event-detail">医嘱：${ev.data.notes.length>60?ev.data.notes.substring(0,60)+'…':ev.data.notes}</div>`;
      break;
    case 'checkup':
      icon = '📋';
      detail = `<div style="font-size:14px;font-weight:500;">${ev.data.type}</div>`;
      if (ev.data.details) detail += `<div class="timeline-event-detail">${ev.data.details.length>60?ev.data.details.substring(0,60)+'…':ev.data.details}</div>`;
      // Show photo thumbnails
      const checkupPhotos = await getPhotosForEvent(ev.id);
      if (checkupPhotos.length) {
        detail += `<div class="timeline-event-photos">`;
        checkupPhotos.forEach(p => {
          detail += `<img src="${p.thumbnail}" onclick="event.stopPropagation();viewPhoto('${p.data.replace(/'/g,"\\'")}')">`;
        });
        detail += `</div>`;
        detail += `<div class="timeline-event-detail">📷${checkupPhotos.length}张</div>`;
      }
      break;
    case 'medication':
      icon = '💊';
      detail = `<div style="font-size:14px;font-weight:500;">${ev.data.name}</div>`;
      detail += `<div class="timeline-event-detail">${ev.data.dosage||''} ${ev.data.frequency?'· '+ev.data.frequency:''}</div>`;
      if (ev.data.sideEffects) detail += `<div class="timeline-event-detail" style="color:var(--danger)">不良反应: ${ev.data.sideEffects}</div>`;
      break;
  }

  return `<div class="timeline-event ${cls}" onclick="openEventForm('${ev.eventType}','${ev.id}')">
    <span class="timeline-event-time">${time}</span>
    <div class="timeline-event-icon">${icon} ${ev.eventType==='symptom'?ev.data.name: ev.eventType==='temperature'?(isFever?'发热':'体温'): ev.eventType==='visit'?(ev.data.diagnosis||'就诊'): ev.eventType==='checkup'?ev.data.type: ev.data.name}</div>
    ${detail}
  </div>`;
}

async function saveIllnessConfig() {
  const ill = await dbGet('illnesses', currentIllnessId);
  if (!ill) return;

  const newTitle = document.getElementById('f-ill-cfg-title').value.trim();
  const newStart = document.getElementById('f-ill-cfg-start').value;
  const newEnd = document.getElementById('f-ill-cfg-end').value;
  const newStatus = document.getElementById('f-ill-cfg-status').value;

  ill.title = newTitle;
  ill.startDate = newStart;
  ill.endDate = newEnd;
  ill.status = newStatus;
  // Mark recovered auto fill end date
  if (newStatus === 'recovered' && !newEnd) {
    ill.endDate = todayISO();
  }
  ill.updatedAt = new Date().toISOString();

  await dbPut('illnesses', ill);
  closeFullModal();
  showToast('病程信息已更新');
  renderIllnessDetail(currentIllnessId);
}

async function deleteIllness() {
  if (!confirm('确定删除此病程？所有关联的事件和照片将一并删除。')) return;

  const events = await dbGetByIndex('events', 'illnessId', currentIllnessId);
  for (const ev of events) {
    await deletePhotosForEvent(ev.id);
    await dbDelete('events', ev.id);
  }
  await dbDelete('illnesses', currentIllnessId);

  closeFullModal();
  closeIllnessDetail();
  showToast('病程已删除');
}

  let ev = eventId ? await dbGet('events', eventId) : null;

  if (!illnessId) return;

  const now = nowISO();

  if (!ev) {
    ev = {
      id: genId(),
      illnessId,
      eventType,
      timestamp: now,
      data: {},
      photos: [],
      createdAt: new Date().toISOString()
    };
  }

  // Load existing photos
  const existingPhotos = eventId ? await getPhotosForEvent(eventId) : [];
  pendingPhotos = existingPhotos.map(p => ({ id:p.id, thumb:p.thumbnail, full:p.data, isExisting:true }));

  let formHTML = '';
  const typeLabel = {symptom:'症状',temperature:'体温',visit:'就诊',checkup:'检查',medication:'用药'}[eventType];

function setSeverity(val) {
  document.querySelectorAll('#severity-stars .severity-star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= val);
  });
}

function updateTempDisplay() {
  const val = parseFloat(document.getElementById('f-evt-temp-val').value) || 36.5;
  const disp = document.getElementById('temp-display');
  disp.textContent = val + '°C';
  disp.className = 'temp-value-display ' + (val >= 37.3 ? 'temp-fever' : 'temp-normal');
}

async function saveEvent(eventType) {
  const eventId = currentEditId || genId();
  const illnessId = currentEditIllnessId;
  const isEdit = !!currentEditId;
  let data = {};

  switch(eventType) {
    case 'symptom': {
      const name = document.getElementById('f-evt-name').value.trim();
      if (!name) { showToast('请输入症状名称'); return; }
      const timestamp = document.getElementById('f-evt-time').value;
      const stars = document.querySelectorAll('#severity-stars .severity-star.active');
      const severity = stars.length || 3;
      const notes = document.getElementById('f-evt-notes').value.trim();
      data = { name, severity, notes };
      const ev = { id: eventId, illnessId, eventType, timestamp, data, createdAt: isEdit ? (await dbGet('events', eventId))?.createdAt || new Date().toISOString() : new Date().toISOString() };
      await dbPut('events', ev);
      break;
    }
    case 'temperature': {
      const value = parseFloat(document.getElementById('f-evt-temp-val').value);
      if (isNaN(value) || value < 35 || value > 42) { showToast('请输入有效体温'); return; }
      const timestamp = document.getElementById('f-evt-time').value;
      const notes = document.getElementById('f-evt-notes').value.trim();
      data = { value, notes };
      const ev = { id: eventId, illnessId, eventType, timestamp, data, createdAt: isEdit ? (await dbGet('events', eventId))?.createdAt || new Date().toISOString() : new Date().toISOString() };
      await dbPut('events', ev);
      break;
    }
    case 'visit': {
      const timestamp = document.getElementById('f-evt-time').value;
      const hospital = document.getElementById('f-evt-hospital').value.trim();
      const department = document.getElementById('f-evt-department').value.trim();
      const doctor = document.getElementById('f-evt-doctor').value.trim();
      const diagnosis = document.getElementById('f-evt-diagnosis').value.trim();
      const notes = document.getElementById('f-evt-notes').value.trim();
      data = { hospital, department, doctor, diagnosis, notes };
      const ev = { id: eventId, illnessId, eventType, timestamp, data, createdAt: isEdit ? (await dbGet('events', eventId))?.createdAt || new Date().toISOString() : new Date().toISOString() };
      await dbPut('events', ev);

      // Save photos
      for (const p of pendingPhotos) {
        if (!p.isExisting) {
          await savePhoto(eventId, p.file);
        }
      }
      if (isEdit) {
        const currentPhotoIds = pendingPhotos.filter(p=>p.isExisting).map(p=>p.id);
        const oldPhotos = await getPhotosForEvent(eventId);
        for (const op of oldPhotos) {
          if (!currentPhotoIds.includes(op.id)) await dbDelete('photos', op.id);
        }
      }
      break;
    }
    case 'checkup': {
      const type = document.getElementById('f-evt-checkup-type').value;
      const timestamp = document.getElementById('f-evt-time').value;
      const hospital = document.getElementById('f-evt-hospital').value.trim();
      const details = document.getElementById('f-evt-details').value.trim();
      data = { type, hospital, details };
      const ev = { id: eventId, illnessId, eventType, timestamp, data, createdAt: isEdit ? (await dbGet('events', eventId))?.createdAt || new Date().toISOString() : new Date().toISOString() };
      await dbPut('events', ev);

      // Save photos
      for (const p of pendingPhotos) {
        if (!p.isExisting) {
          await savePhoto(eventId, p.file);
        }
      }
      if (isEdit) {
        const currentPhotoIds = pendingPhotos.filter(p=>p.isExisting).map(p=>p.id);
        const oldPhotos = await getPhotosForEvent(eventId);
        for (const op of oldPhotos) {
          if (!currentPhotoIds.includes(op.id)) await dbDelete('photos', op.id);
        }
      }
      break;
    }
    case 'medication': {
      const name = document.getElementById('f-evt-name').value.trim();
      if (!name) { showToast('请输入药品名称'); return; }
      const dosage = document.getElementById('f-evt-dosage').value.trim();
      const frequency = document.getElementById('f-evt-frequency').value.trim();
      const startDate = document.getElementById('f-evt-med-start').value;
      const endDate = document.getElementById('f-evt-med-end').value;
      const sideEffects = document.getElementById('f-evt-notes').value.trim();
      data = { name, dosage, frequency, startDate, endDate, sideEffects };
      // Use start date + current time as timestamp for medication
      const timestamp = startDate ? startDate + 'T' + new Date().getHours().toString().padStart(2,'0') + ':' + new Date().getMinutes().toString().padStart(2,'0') : nowISO();
      const ev = { id: eventId, illnessId, eventType, timestamp, data, createdAt: isEdit ? (await dbGet('events', eventId))?.createdAt || new Date().toISOString() : new Date().toISOString() };
      await dbPut('events', ev);
      break;
    }
  }

  // Update illness updatedAt
  const ill = await dbGet('illnesses', illnessId);
  if (ill) {
    ill.updatedAt = new Date().toISOString();
    await dbPut('illnesses', ill);
  }

  closeFullModal();
  showToast('已保存');
  renderIllnessDetail(illnessId);
}

  <div class="form-row">
    <div class="form-group"><label class="form-label">接种日期</label><input type="date" class="form-input" id="f-vaccine-date" value="${v.date}"></div>
    <div class="form-group"><label class="form-label">接种医院</label><input class="form-input" id="f-vaccine-hospital" value="${v.hospital}" placeholder="医院"></div>
  </div>
  <div class="form-group"><label class="form-label">批次号</label><input class="form-input" id="f-vaccine-batch" value="${v.batchNo}" placeholder="可选"></div>
  <div class="form-group"><label class="form-label">备注</label><textarea class="form-input" id="f-vaccine-notes" placeholder="如接种后反应">${v.notes}</textarea></div>
  ${id ? `<button class="btn btn-danger btn-block" onclick="deleteVaccine('${id}')" style="margin-bottom:12px">删除</button>` : ''}
  <button class="btn btn-primary btn-block" onclick="saveVaccine('${v.id}')">保存疫苗记录</button>`;

  openFullModal(id ? '编辑疫苗' : '记疫苗', html, 'vaccine', id, null);
}

async function saveVaccine(id) {
  const name = document.getElementById('f-vaccine-name').value.trim();
  if (!name) { showToast('请输入疫苗名称'); return; }
  const date = document.getElementById('f-vaccine-date').value;
  const hospital = document.getElementById('f-vaccine-hospital').value.trim();
  const batchNo = document.getElementById('f-vaccine-batch').value.trim();
  const notes = document.getElementById('f-vaccine-notes').value.trim();

  const existing = id ? await dbGet('vaccines', id) : null;
  await dbPut('vaccines', { id, name, date, hospital, batchNo, notes, createdAt: existing ? existing.createdAt : new Date().toISOString() });
  closeFullModal();
  showToast('疫苗记录已保存');
  renderVaccines();
}

async function deleteVaccine(id) {
  if (!confirm('确定删除此疫苗记录？')) return;
  await dbDelete('vaccines', id);
  closeFullModal();
  showToast('已删除');
  renderVaccines();
}

// ==================== Config Modal ====================
function showConfigModal() {
  const cfg = getConfig();
  const html = `
  <div class="config-avatar">🧒</div>
  <div class="form-group"><label class="form-label">宝贝昵称</label><input class="form-input" id="f-cfg-name" value="${cfg.childName}" placeholder="宝贝昵称"></div>
  <div class="form-group"><label class="form-label">出生日期</label><input type="date" class="form-input" id="f-cfg-birth" value="${cfg.childBirthDate||''}"></div>
  <button class="btn btn-primary btn-block" onclick="saveConfigModal()">保存</button>
  <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
    <button class="btn btn-secondary btn-block" onclick="exportData()">导出数据</button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary btn-block" onclick="importDataClick()">导入数据</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>`;

  openFullModal('设置', html, null, null, null);
}

function saveConfigModal() {
  const cfg = getConfig();
  cfg.childName = document.getElementById('f-cfg-name').value.trim() || '宝贝';
  cfg.childBirthDate = document.getElementById('f-cfg-birth').value;
  saveConfig(cfg);
  closeFullModal();
  showToast('设置已保存');
  renderPage(currentPage);
}

async function exportData() {
  const stores = ['illnesses','events','photos','vaccines'];
  const data = {};
  for (const store of stores) {
    data[store] = await dbGetAll(store);
  }
  data.config = getConfig();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `童病记_备份_${formatDate(new Date())}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importDataClick() {
  document.getElementById('import-file').click();
}

async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const stores = ['illnesses','events','photos','vaccines'];
    for (const store of stores) {
      if (data[store] && Array.isArray(data[store])) {
        for (const item of data[store]) {
          await dbPut(store, item);
        }
      }
    }
    // Also try importing from old format
    const oldStores = ['visits','symptoms','temperatures','checkups','medications'];
    for (const store of oldStores) {
      if (data[store] && Array.isArray(data[store])) {
        for (const item of data[store]) {
          await dbPut(store, item);
        }
      }
    }
    if (data.config) saveConfig(data.config);
    showToast('数据导入成功');
    closeFullModal();
    renderPage(currentPage);
  } catch(err) {
    showToast('导入失败：文件格式错误');
  }
}

// ==================== PWA Service Worker ====================
const SW_CODE = `
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ==================== Manifest ====================
const manifest = {
  name: '童病记 - 儿童生病治疗记录',
  short_name: '童病记',
  description: '以病程为核心的儿童健康记录工具',
  start_url: location.href,
  display: 'standalone',
  background_color: '#ffffff',
  theme_color: '#e8654a',
  icons: [{
    src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🧒</text></svg>'),
    sizes: '192x192',
    type: 'image/svg+xml'
  }]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestUrl = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = manifestUrl;
document.head.appendChild(manifestLink);

// ==================== Init ====================
async function init() {
  await openDB();
  renderHome();
}

init();
</script>
</body>
