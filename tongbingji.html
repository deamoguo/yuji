<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#e8654a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧒</text></svg>">
  <meta name="description" content="童病记 - 儿童生病治疗记录工具，记录就诊、症状、检查、用药、疫苗">
  <title>童病记</title>
  <style>
:root {
  --primary: #e8654a;
  --primary-light: #f0846e;
  --primary-dark: #d14e33;
  --primary-bg: rgba(232,101,74,0.08);
  --bg: #ffffff;
  --bg-secondary: #f8f9fa;
  --border: #e9ecef;
  --text: #212529;
  --text-secondary: #6c757d;
  --text-light: #adb5bd;
  --danger: #dc3545;
  --warning: #ffc107;
  --success: #28a745;
  --info: #17a2b8;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; touch-action:manipulation; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5;
}

.app-container { display:flex; flex-direction:column; height:100vh; height:100dvh; }

.page-content {
  flex:1; min-height:0; -webkit-overflow-scrolling:touch;
  overflow-y:auto; overflow-x:hidden;
  padding-bottom: calc(70px + var(--safe-bottom));
  background: var(--bg);
}

.page-header { padding:20px 20px 16px; background:var(--bg); position:sticky; top:0; z-index:10; }
.page-title { font-size:28px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
.page-subtitle { font-size:14px; color:var(--text-secondary); margin-top:4px; }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; display:flex;
  background:var(--bg); border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom); z-index:100;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 0; color:var(--text-light); text-decoration:none;
  font-size:11px; transition:color 0.2s; cursor:pointer; border:none; background:none;
}
.nav-item.active { color:var(--primary); }
.nav-item svg { width:24px; height:24px; margin-bottom:4px; }
.nav-item span { font-weight:500; }

/* Card */
.card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin:0 16px 12px; transition:transform 0.15s;
}
.card:active { transform:scale(0.98); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-title { font-size:17px; font-weight:600; color:var(--text); }
.card-badge {
  font-size:12px; padding:4px 10px; border-radius:20px;
  background:var(--primary); color:white; font-weight:500; white-space:nowrap;
}
.card-badge.green { background:var(--success); }
.card-badge.orange { background:var(--warning); color:#333; }
.card-badge.blue { background:var(--info); }
.card-badge.gray { background:var(--text-light); }
.card-meta { font-size:13px; color:var(--text-secondary); display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
.card-actions { display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }

/* Button */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 20px; border-radius:var(--radius-sm); font-size:15px; font-weight:600;
  border:none; cursor:pointer; transition:all 0.15s; text-decoration:none; min-height:48px;
}
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-primary:active { transform:scale(0.97); }
.btn-secondary { background:var(--bg-secondary); color:var(--text); border:1px solid var(--border); }
.btn-ghost { background:transparent; color:var(--primary); padding:8px 12px; min-height:auto; }
.btn-danger { background:var(--danger); color:white; }
.btn-block { width:100%; }
.btn-sm { padding:8px 14px; font-size:13px; min-height:36px; }

/* Floating Action Button */
.fab {
  position:fixed; bottom:calc(80px + var(--safe-bottom)); right:20px;
  width:56px; height:56px; border-radius:50%; background:var(--primary);
  color:white; border:none; cursor:pointer; display:flex; align-items:center;
  justify-content:center; box-shadow:0 4px 16px rgba(232,101,74,0.4);
  transition:all 0.2s; z-index:50;
}
.fab:active { transform:scale(0.92); }
.fab svg { width:28px; height:28px; }

/* Form */
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:14px; font-weight:600; color:var(--text); margin-bottom:8px; }
.form-input {
  width:100%; padding:14px 16px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:16px; background:var(--bg);
  color:var(--text); transition:border-color 0.15s;
}
.form-input:focus { outline:none; border-color:var(--primary); }
.form-input::placeholder { color:var(--text-light); }
textarea.form-input { resize:vertical; min-height:80px; }
.form-hint { font-size:12px; color:var(--text-secondary); margin-top:6px; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }

.select-wrapper { position:relative; }
.form-select {
  width:100%; padding:14px 40px 14px 16px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:16px; background:var(--bg);
  color:var(--text); appearance:none; cursor:pointer;
}
.form-select:focus { outline:none; border-color:var(--primary); }
.select-arrow { position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--text-secondary); }

/* Severity Stars */
.severity-stars { display:flex; gap:8px; }
.severity-star {
  width:36px; height:36px; border-radius:50%; border:2px solid var(--border);
  background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:all 0.15s;
}
.severity-star.active { border-color:var(--primary); background:var(--primary-bg); }
.severity-star.active::after { content:'★'; color:var(--primary); }
.severity-star:not(.active)::after { content:'☆'; color:var(--text-light); }

/* Photo */
.photo-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.photo-thumb {
  width:80px; height:80px; border-radius:var(--radius-sm); object-fit:cover;
  border:1px solid var(--border); cursor:pointer; transition:transform 0.15s;
}
.photo-thumb:active { transform:scale(0.95); }
.photo-add {
  width:80px; height:80px; border-radius:var(--radius-sm);
  border:2px dashed var(--border); display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer;
  color:var(--text-light); font-size:12px; transition:all 0.15s; background:none;
}
.photo-add:active { border-color:var(--primary); color:var(--primary); }
.photo-add svg { width:24px; height:24px; margin-bottom:2px; }

/* Photo Viewer */
.photo-viewer {
  position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:300;
  display:none; align-items:center; justify-content:center;
  flex-direction:column;
}
.photo-viewer.show { display:flex; }
.photo-viewer img { max-width:95%; max-height:85vh; object-fit:contain; border-radius:8px; }
.photo-viewer-close {
  position:absolute; top:16px; right:16px; width:40px; height:40px;
  border-radius:50%; background:rgba(255,255,255,0.2); border:none;
  color:white; font-size:24px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
}

/* Modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:200; opacity:0; visibility:hidden; transition:all 0.25s;
}
.modal-overlay.show { opacity:1; visibility:visible; }
.modal {
  background:var(--bg); border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
  transform:translateY(100%); transition:transform 0.25s ease-out;
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg); z-index:1;
}
.modal-title { font-size:18px; font-weight:600; }
.modal-close {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border:none; background:none; color:var(--text-secondary); cursor:pointer;
  border-radius:50%; transition:background 0.1s;
}
.modal-close:active { background:var(--bg-secondary); }
.modal-body { padding:20px; }
.modal-footer {
  padding:16px 20px; padding-bottom:calc(16px + var(--safe-bottom));
  border-top:1px solid var(--border); display:flex; gap:12px;
}
.modal-footer .btn { flex:1; }

/* Full page modal */
.full-modal {
  position:fixed; inset:0; background:var(--bg); z-index:150;
  display:none; flex-direction:column;
}
.full-modal.show { display:flex; }
.full-modal-header {
  display:flex; align-items:center; padding:12px 16px;
  border-bottom:1px solid var(--border); gap:12px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
}
.full-modal-back {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border:none; background:none; color:var(--text); cursor:pointer;
  border-radius:50%; font-size:20px;
}
.full-modal-back:active { background:var(--bg-secondary); }
.full-modal-title { font-size:17px; font-weight:600; flex:1; }
.full-modal-body { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }

/* Empty State */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 30px; text-align:center;
}
.empty-icon { width:80px; height:80px; margin-bottom:20px; color:var(--text-light); }
.empty-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:8px; }
.empty-desc { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }

/* Search */
.search-bar {
  display:flex; align-items:center; gap:10px; padding:0 16px 16px;
}
.search-input-wrap {
  flex:1; position:relative; display:flex; align-items:center;
}
.search-input-wrap svg { position:absolute; left:14px; color:var(--text-light); width:18px; height:18px; }
.search-input {
  width:100%; padding:12px 16px 12px 42px; border:1px solid var(--border);
  border-radius:24px; font-size:15px; background:var(--bg-secondary);
  color:var(--text); transition:border-color 0.15s;
}
.search-input:focus { outline:none; border-color:var(--primary); background:var(--bg); }
.search-input::placeholder { color:var(--text-light); }

.search-section { margin:0 16px 16px; }
.search-section-title {
  font-size:13px; font-weight:600; color:var(--text-secondary);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; padding-left:4px;
}
.search-result-item {
  display:flex; align-items:center; padding:12px; border-radius:var(--radius-sm);
  cursor:pointer; transition:background 0.1s; gap:12px;
}
.search-result-item:active { background:var(--bg-secondary); }
.search-result-icon {
  width:36px; height:36px; border-radius:10px; display:flex;
  align-items:center; justify-content:center; flex-shrink:0;
}
.search-result-icon.visit { background:rgba(232,101,74,0.1); color:var(--primary); }
.search-result-icon.checkup { background:rgba(23,162,184,0.1); color:var(--info); }
.search-result-icon.med { background:rgba(255,193,7,0.1); color:#e6a800; }
.search-result-icon.vaccine { background:rgba(40,167,69,0.1); color:var(--success); }
.search-result-icon.symptom { background:rgba(232,101,74,0.1); color:var(--primary); }
.search-result-content { flex:1; min-width:0; }
.search-result-title { font-size:15px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.search-result-meta { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.search-highlight { background:#ffeaa7; padding:0 2px; border-radius:2px; }

.search-history { padding:0 16px; }
.search-history-title {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:12px;
}
.search-history-title span { font-size:14px; font-weight:600; color:var(--text-secondary); }
.search-history-clear { font-size:13px; color:var(--primary); background:none; border:none; cursor:pointer; }
.history-tags { display:flex; flex-wrap:wrap; gap:8px; }
.history-tag {
  padding:6px 14px; border-radius:20px; font-size:13px;
  background:var(--bg-secondary); color:var(--text-secondary);
  border:none; cursor:pointer;
}
.history-tag:active { background:var(--primary-bg); color:var(--primary); }

/* Dashboard */
.dash-section { margin-bottom:20px; }
.dash-section-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:0 16px; margin-bottom:10px;
}
.dash-section-title { font-size:17px; font-weight:600; }
.dash-section-more { font-size:13px; color:var(--primary); background:none; border:none; cursor:pointer; }
.dash-quick-actions {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
  padding:0 16px; margin-bottom:20px;
}
.dash-quick-btn {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:16px 8px; border-radius:var(--radius); background:var(--bg);
  border:1px solid var(--border); cursor:pointer; transition:all 0.15s;
}
.dash-quick-btn:active { transform:scale(0.95); border-color:var(--primary); }
.dash-quick-icon {
  width:40px; height:40px; border-radius:12px; display:flex;
  align-items:center; justify-content:center;
}
.dash-quick-icon.visit-icon { background:rgba(232,101,74,0.1); color:var(--primary); }
.dash-quick-icon.symptom-icon { background:rgba(255,193,7,0.1); color:#e6a800; }
.dash-quick-icon.med-icon { background:rgba(40,167,69,0.1); color:var(--success); }
.dash-quick-icon.checkup-icon { background:rgba(23,162,184,0.1); color:var(--info); }
.dash-quick-label { font-size:13px; font-weight:500; color:var(--text); }

.dash-card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  margin:0 16px 10px; padding:14px 16px; cursor:pointer; transition:transform 0.15s;
}
.dash-card:active { transform:scale(0.98); }
.dash-card-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.dash-card-meta { font-size:13px; color:var(--text-secondary); }
.dash-card-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }

.tag {
  display:inline-block; padding:3px 10px; border-radius:12px;
  font-size:12px; font-weight:500;
}
.tag-primary { background:var(--primary-bg); color:var(--primary); }
.tag-success { background:rgba(40,167,69,0.1); color:var(--success); }
.tag-warning { background:rgba(255,193,7,0.15); color:#b8860b; }
.tag-info { background:rgba(23,162,184,0.1); color:var(--info); }
.tag-gray { background:var(--bg-secondary); color:var(--text-secondary); }

/* Temperature chart */
.temp-chart-container { padding:0 16px; margin-bottom:16px; }
.temp-chart { width:100%; height:160px; border-radius:var(--radius); background:var(--bg-secondary); }

/* Timeline */
.timeline { position:relative; padding-left:28px; margin:0 16px; }
.timeline::before {
  content:''; position:absolute; left:8px; top:0; bottom:0;
  width:2px; background:var(--border);
}
.timeline-item { position:relative; padding-bottom:20px; }
.timeline-item::before {
  content:''; position:absolute; left:-24px; top:4px;
  width:12px; height:12px; border-radius:50%;
  background:var(--primary); border:2px solid var(--bg);
}
.timeline-item.ended::before { background:var(--text-light); }
.timeline-date { font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
.timeline-title { font-size:15px; font-weight:600; margin-bottom:2px; }
.timeline-desc { font-size:13px; color:var(--text-secondary); }
.timeline-severity { display:flex; gap:2px; }
.timeline-severity .star { color:var(--primary); font-size:12px; }
.timeline-severity .star.empty { color:var(--text-light); }

/* Filter */
.filter-bar {
  display:flex; gap:8px; padding:0 16px 16px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.filter-chip {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:500;
  white-space:nowrap; border:1px solid var(--border); background:var(--bg);
  color:var(--text-secondary); cursor:pointer; transition:all 0.15s;
}
.filter-chip.active { background:var(--primary); border-color:var(--primary); color:white; }

/* Checkbox list for linking */
.link-list { border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; max-height:200px; overflow-y:auto; }
.link-item {
  display:flex; align-items:center; padding:12px 16px;
  border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s;
}
.link-item:last-child { border-bottom:none; }
.link-item:active { background:var(--bg-secondary); }
.link-item input { width:18px; height:18px; margin-right:10px; accent-color:var(--primary); flex-shrink:0; }
.link-item-content { flex:1; min-width:0; }
.link-item-title { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.link-item-meta { font-size:12px; color:var(--text-secondary); }

/* Date range filter */
.date-filter { display:flex; gap:8px; padding:0 16px 12px; align-items:center; }
.date-filter input[type="date"] {
  flex:1; padding:10px 12px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-size:14px; background:var(--bg);
  color:var(--text);
}
.date-filter span { color:var(--text-light); font-size:14px; }

/* Vaccine preset */
.vaccine-presets { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.vaccine-preset {
  padding:6px 14px; border-radius:20px; font-size:13px;
  background:var(--bg-secondary); color:var(--text-secondary);
  border:1px solid var(--border); cursor:pointer; transition:all 0.15s;
}
.vaccine-preset:active { background:var(--primary-bg); border-color:var(--primary); color:var(--primary); }

/* Toast */
.toast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-100px);
  background:var(--text); color:white; padding:12px 24px; border-radius:24px;
  font-size:14px; font-weight:500; z-index:500; opacity:0;
  transition:all 0.3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Tab inside page */
.sub-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:16px; }
.sub-tab {
  flex:1; padding:12px; text-align:center; font-size:14px; font-weight:500;
  color:var(--text-secondary); background:none; border:none; cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
}
.sub-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Temp input */
.temp-input-row { display:flex; gap:12px; align-items:flex-end; }
.temp-input-row .form-group { flex:1; }
.temp-value-display {
  font-size:48px; font-weight:700; text-align:center; padding:20px;
}
.temp-normal { color:var(--success); }
.temp-fever { color:var(--danger); }
.temp-low { color:var(--info); }

/* Scrollbar */
.page-content::-webkit-scrollbar { width:0; }
.modal::-webkit-scrollbar { width:0; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease-out; }

/* Config modal */
.config-avatar {
  width:80px; height:80px; border-radius:50%; background:var(--primary-bg);
  display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
  font-size:40px;
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Pages -->
  <div id="page-home" class="page-content"></div>
  <div id="page-visit" class="page-content" style="display:none"></div>
  <div id="page-checkup" class="page-content" style="display:none"></div>
  <div id="page-track" class="page-content" style="display:none"></div>
  <div id="page-search" class="page-content" style="display:none"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4h4v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
      <span>首页</span>
    </button>
    <button class="nav-item" data-page="visit">

<script>
// ==================== Utility ====================
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,9); }

function parseLocalDatetime(dtStr) {
  if (!dtStr) return new Date();
  const s = dtStr.replace('T',' ');
  const [d,t] = s.split(' ');
  const [y,m,day] = d.split('-').map(Number);
  const [h,min] = (t||'00:00').split(':').map(Number);
  return new Date(y, m-1, day, h||0, min||0);
}

function formatDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function formatDatetime(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  return `${formatDate(dt)} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function formatRelative(d) {
  const dt = typeof d === 'string' ? parseLocalDatetime(d) : d;
  const now = new Date();
  const diff = now - dt;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 7) return `${days}天前`;
  if (days < 30) return `${Math.floor(days/7)}周前`;
  return formatDate(dt);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ==================== IndexedDB ====================
const DB_NAME = 'child_health_db';
const DB_VERSION = 1;
const STORES = ['visits','symptoms','temperatures','checkups','medications','vaccines','photos'];

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          const store = db.createObjectStore(name, { keyPath: 'id' });
          store.createIndex('createdAt','createdAt');
        }
      });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.getAll(value);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// ==================== Photo Handling ====================
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function savePhoto(recordType, recordId, file) {
  const full = await compressImage(file, 1200, 0.8);
  const thumb = await compressImage(file, 200, 0.6);
  const photo = {
    id: genId(), recordType, recordId,
    data: full, thumbnail: thumb,
    createdAt: new Date().toISOString()
  };
  await dbPut('photos', photo);
  return photo.id;
}

async function getPhotosForRecord(recordType, recordId) {
  const all = await dbGetAll('photos');
  return all.filter(p => p.recordType === recordType && p.recordId === recordId);
}

async function deletePhotosForRecord(recordType, recordId) {
  const photos = await getPhotosForRecord(recordType, recordId);
  for (const p of photos) { await dbDelete('photos', p.id); }
}

// ==================== Temperature Chart ====================
function drawTempChart(canvasId, temps) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top:20, right:16, bottom:30, left:40 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Find range
  const vals = temps.map(t => t.value);
  const minV = Math.min(35, Math.min(...vals) - 0.5);
  const maxV = Math.max(39.5, Math.max(...vals) + 0.5);

  function xPos(i) { return pad.left + (temps.length > 1 ? i / (temps.length-1) * cw : cw/2); }
  function yPos(v) { return pad.top + (1 - (v - minV) / (maxV - minV)) * ch; }

  // Background
  ctx.fillStyle = '#f8f9fa';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#e9ecef';
  ctx.lineWidth = 1;
  for (let v = 36; v <= 39; v += 0.5) {
    const y = yPos(v);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
  }

  // Fever line at 37.3
  const feverY = yPos(37.3);
  ctx.strokeStyle = 'rgba(220,53,69,0.4)';
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.left, feverY); ctx.lineTo(W-pad.right, feverY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(220,53,69,0.6)';
  ctx.font = '10px sans-serif';
  ctx.fillText('37.3°C', W - pad.right - 34, feverY - 4);

  // Line
  ctx.strokeStyle = '#e8654a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  temps.forEach((t, i) => {
    const x = xPos(i), y = yPos(t.value);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots and labels
  temps.forEach((t, i) => {
    const x = xPos(i), y = yPos(t.value);
    ctx.fillStyle = t.value >= 37.3 ? '#dc3545' : '#e8654a';
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6c757d';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    const dt = parseLocalDatetime(t.date);
    ctx.fillText(`${dt.getMonth()+1}/${dt.getDate()}`, x, H - 8);
    ctx.fillText(t.value + '°', x, y - 10);
  });

  // Y axis labels
  ctx.textAlign = 'right';
  ctx.fillStyle = '#adb5bd';
  ctx.font = '10px sans-serif';
  for (let v = 36; v <= 39; v += 1) {
    ctx.fillText(v + '°', pad.left - 6, yPos(v) + 3);
  }
}

async function openVisitForm(id) {
  let v = id ? await dbGet('visits', id) : null;
  if (!v) v = { id:genId(), date:new Date().toISOString().slice(0,16), hospital:'', department:'', doctor:'', symptoms:[], diagnosis:'', notes:'', checkupIds:[], medicationIds:[], createdAt:new Date().toISOString() };

  // Load existing photos
  const existingPhotos = id ? await getPhotosForRecord('visits', id) : [];
  pendingPhotos = existingPhotos.map(p => ({ id:p.id, thumb:p.thumbnail, full:p.data, isExisting:true }));

  const checkups = await dbGetAll('checkups');
  const meds = await dbGetAll('medications');

  const now = new Date();
  const defaultDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  let html = `
  <div class="form-group">
    <label class="form-label">就诊日期</label>
    <input type="datetime-local" class="form-input" id="f-visit-date" value="${v.date || defaultDate}">
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">医院</label><input class="form-input" id="f-visit-hospital" value="${v.hospital}" placeholder="医院名称"></div>
    <div class="form-group"><label class="form-label">科室</label><input class="form-input" id="f-visit-department" value="${v.department}" placeholder="科室"></div>
  </div>
  <div class="form-group"><label class="form-label">医生</label><input class="form-input" id="f-visit-doctor" value="${v.doctor}" placeholder="医生姓名"></div>
  <div class="form-group"><label class="form-label">主诉/症状</label><input class="form-input" id="f-visit-symptoms" value="${(v.symptoms||[]).join('，')}" placeholder="多个症状用逗号分隔"><div class="form-hint">如：发热，咳嗽，流鼻涕</div></div>
  <div class="form-group"><label class="form-label">诊断结果</label><input class="form-input" id="f-visit-diagnosis" value="${v.diagnosis}" placeholder="医生诊断"></div>
  <div class="form-group"><label class="form-label">医嘱/备注</label><textarea class="form-input" id="f-visit-notes" placeholder="医嘱和注意事项">${v.notes}</textarea></div>

  <div class="form-group"><label class="form-label">就诊照片（最多10张）</label>
    <div id="photo-preview-area"></div>
  </div>`;

  // Link checkups
  if (checkups.length) {
    html += `<div class="form-group"><label class="form-label">关联检查报告</label><div class="link-list">`;
    checkups.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).forEach(c => {
      const checked = (v.checkupIds||[]).includes(c.id) ? 'checked' : '';
      html += `<label class="link-item"><input type="checkbox" value="${c.id}" ${checked}><div class="link-item-content"><div class="link-item-title">${c.type} - ${formatDate(c.date)}</div><div class="link-item-meta">${c.hospital||''}</div></div></label>`;
    });
    html += `</div></div>`;
  }

  // Link meds
  if (meds.length) {
    html += `<div class="form-group"><label class="form-label">关联用药</label><div class="link-list">`;
    meds.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).forEach(m => {
      const checked = (v.medicationIds||[]).includes(m.id) ? 'checked' : '';
      html += `<label class="link-item"><input type="checkbox" value="${m.id}" ${checked}><div class="link-item-content"><div class="link-item-title">${m.name} ${m.dosage}</div><div class="link-item-meta">${m.frequency} · ${m.status}</div></div></label>`;
    });
    html += `</div></div>`;
  }

  html += `<button class="btn btn-primary btn-block" onclick="saveVisit('${v.id}')">保存就诊记录</button>`;

  openFullModal(id ? '编辑就诊' : '记就诊', html, 'visits', id);
  renderPhotoPreview();
}

async function saveVisit(id) {
  const date = document.getElementById('f-visit-date').value;
  const hospital = document.getElementById('f-visit-hospital').value.trim();
  const department = document.getElementById('f-visit-department').value.trim();
  const doctor = document.getElementById('f-visit-doctor').value.trim();
  const symptomsStr = document.getElementById('f-visit-symptoms').value.trim();
  const symptoms = symptomsStr ? symptomsStr.split(/[,，、]/).map(s=>s.trim()).filter(Boolean) : [];
  const diagnosis = document.getElementById('f-visit-diagnosis').value.trim();
  const notes = document.getElementById('f-visit-notes').value.trim();

  // Get linked items
  const checkupIds = [];
  document.querySelectorAll('#full-modal-body .link-item input[type=checkbox]').forEach((cb, i) => {
    // We need to distinguish checkups from meds - checkups come first
  });

  // Simpler: collect all checked
  const allCheckboxes = document.querySelectorAll('#full-modal-body .link-item input[type=checkbox]');
  const checkupCount = (await dbGetAll('checkups')).length;
  const checkedValues = [];
  allCheckboxes.forEach(cb => { if (cb.checked) checkedValues.push(cb.value); });

  // Determine which are checkupIds and which are medicationIds
  const allCheckupIds = (await dbGetAll('checkups')).map(c=>c.id);
  const checkupIdsFinal = checkedValues.filter(v => allCheckupIds.includes(v));
  const medicationIdsFinal = checkedValues.filter(v => !allCheckupIds.includes(v));

  const existing = id ? await dbGet('visits', id) : null;

  const data = {
    id, date, hospital, department, doctor, symptoms, diagnosis, notes,
    checkupIds: checkupIdsFinal, medicationIds: medicationIdsFinal,
    createdAt: existing ? existing.createdAt : new Date().toISOString()
  };

  await dbPut('visits', data);

  // Save new photos
  for (const p of pendingPhotos) {
    if (!p.isExisting) {
      await savePhoto('visits', id, p.file);
    }
  }

  // Delete removed existing photos
  if (existing) {
    const currentPhotoIds = pendingPhotos.filter(p=>p.isExisting).map(p=>p.id);
    const oldPhotos = await getPhotosForRecord('visits', id);
    for (const op of oldPhotos) {
      if (!currentPhotoIds.includes(op.id)) {
        await dbDelete('photos', op.id);
      }
    }
  }

  closeFullModal();
  showToast('就诊记录已保存');
  renderPage(currentPage);
}

      ${[1,2,3,4,5].map(i => `<button type="button" class="severity-star ${i<=s.severity?'active':''}" data-val="${i}" onclick="setSeverity(${i})"></button>`).join('')}
    </div>
    <div class="form-hint">1星最轻，5星最重</div>
  </div>
  <div class="form-group"><label class="form-label">备注</label><textarea class="form-input" id="f-symptom-notes" placeholder="补充说明">${s.notes}</textarea></div>`;

  if (visits.length) {
    html += `<div class="form-group"><label class="form-label">关联就诊记录</label><div class="select-wrapper">
      <select class="form-select" id="f-symptom-visit">
        <option value="">不关联</option>
        ${visits.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).map(v=>`<option value="${v.id}" ${s.visitId===v.id?'selected':''}>${formatDate(v.date)} ${v.diagnosis||''}</option>`).join('')}
      </select><span class="select-arrow">▾</span></div></div>`;
  }

  html += `<button class="btn btn-primary btn-block" onclick="saveSymptom('${s.id}')">保存症状</button>`;

  openFullModal(id ? '编辑症状' : '记症状', html, 'symptoms', id);
}

function setSeverity(val) {
  document.querySelectorAll('#severity-stars .severity-star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= val);
  });
}

async function saveSymptom(id) {
  const name = document.getElementById('f-symptom-name').value.trim();

  const severity = stars.length;
  const notes = document.getElementById('f-symptom-notes').value.trim();
  const visitId = document.getElementById('f-symptom-visit')?.value || '';

  const existing = id ? await dbGet('symptoms', id) : null;
  await dbPut('symptoms', { id, name, startDate, endDate, severity, notes, visitId, createdAt: existing ? existing.createdAt : new Date().toISOString() });
  closeFullModal();
  showToast('症状已保存');
  renderPage(currentPage);
}

// ==================== Temperature Form ====================
async function openTempForm(id) {
  let t = id ? await dbGet('temperatures', id) : null;
  if (!t) t = { id:genId(), value:36.5, date:new Date().toISOString().slice(0,16), notes:'', createdAt:new Date().toISOString() };

  const now = new Date();
  const defaultDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  let html = `
  <div class="temp-value-display ${t.value>=37.3?'temp-fever':t.value<36?'temp-low':'temp-normal'}" id="temp-display">${t.value}°C</div>
  <div class="form-group"><label class="form-label">体温 (°C)</label><input type="number" class="form-input" id="f-temp-value" value="${t.value}" step="0.1" min="35" max="42" oninput="updateTempDisplay()"></div>
  <div class="form-group"><label class="form-label">测量时间</label><input type="datetime-local" class="form-input" id="f-temp-date" value="${t.date || defaultDate}"></div>
  <div class="form-group"><label class="form-label">备注</label><input class="form-input" id="f-temp-notes" value="${t.notes||''}" placeholder="如：腋下测量"></div>
  <button class="btn btn-primary btn-block" onclick="saveTemp('${t.id}')">保存体温</button>`;

  openFullModal(id ? '编辑体温' : '记录体温', html, 'temperatures', id);
}

function updateTempDisplay() {
  const val = parseFloat(document.getElementById('f-temp-value').value) || 36.5;
  const disp = document.getElementById('temp-display');
  disp.textContent = val + '°C';
  disp.className = 'temp-value-display ' + (val >= 37.3 ? 'temp-fever' : val < 36 ? 'temp-low' : 'temp-normal');
}

async function saveTemp(id) {
  const value = parseFloat(document.getElementById('f-temp-value').value);
  if (isNaN(value) || value < 35 || value > 42) { showToast('请输入有效体温'); return; }
  const date = document.getElementById('f-temp-date').value;
  const notes = document.getElementById('f-temp-notes').value.trim();

  const existing = id ? await dbGet('temperatures', id) : null;
  await dbPut('temperatures', { id, value, date, notes, createdAt: existing ? existing.createdAt : new Date().toISOString() });
  closeFullModal();
  showToast('体温已保存');
  renderPage(currentPage);
}

// ==================== SEARCH ====================
async function renderSearch() {
  const el = document.getElementById('page-search');
  const history = getSearchHistory();

  let html = `
  <div class="page-header">
    <div class="page-title">搜索</div>
    <div class="page-subtitle">搜索症状、诊断、检查、用药等记录</div>
  </div>
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="输入关键词搜索..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter')doSearch()">
    </div>
    <button class="btn btn-primary btn-sm" onclick="doSearch()">搜索</button>
  </div>`;

  // Search history
  if (history.length > 0) {
    html += `<div class="search-history">
      <div class="search-history-title"><span>搜索历史</span><button class="search-history-clear" onclick="clearSearchHistory()">清除</button></div>
      <div class="history-tags">${history.map(h => `<button class="history-tag" onclick="searchKeyword('${h.replace(/'/g,"\\'")}')">${h}</button>`).join('')}</div>
    </div>`;
  }

  html += `<div id="search-results"></div>`;
  el.innerHTML = html;
}

function debounceSearch() {
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(() => doSearch(), 400);
}

async function doSearch() {
  const keyword = document.getElementById('search-input').value.trim();
  if (!keyword) { document.getElementById('search-results').innerHTML = ''; return; }

  addSearchHistory(keyword);
  const results = await searchAll(keyword);
  renderSearchResults(results, keyword);
}

async function searchKeyword(kw) {
  document.getElementById('search-input').value = kw;
  await doSearch();
}

async function searchAll(keyword) {
  const kw = keyword.toLowerCase();
  const results = [];

  // Search visits
  const visits = await dbGetAll('visits');
  visits.forEach(v => {
    const fields = [v.diagnosis, v.notes, v.hospital, ...(v.symptoms||[])].filter(Boolean).join(' ').toLowerCase();
    if (fields.includes(kw)) {
      results.push({ type:'visit', id:v.id, title:v.diagnosis||'就诊记录', meta:`${formatDate(v.date)} ${v.hospital||''}`, icon:'visit', data:v });
    }
  });

  // Search checkups
  const checkups = await dbGetAll('checkups');
  checkups.forEach(c => {
    const fields = [c.type, c.details, c.hospital].filter(Boolean).join(' ').toLowerCase();
    if (fields.includes(kw)) {
      results.push({ type:'checkup', id:c.id, title:c.type, meta:`${formatDate(c.date)} ${c.hospital||''}`, icon:'checkup', data:c });
    }
  });

  // Search medications
  const meds = await dbGetAll('medications');
  meds.forEach(m => {
    const fields = [m.name, m.dosage, m.frequency, m.sideEffects].filter(Boolean).join(' ').toLowerCase();
    if (fields.includes(kw)) {
      results.push({ type:'medication', id:m.id, title:m.name, meta:`${m.dosage} · ${m.frequency}`, icon:'med', data:m });
    }
  });

  // Search vaccines
  const vaccines = await dbGetAll('vaccines');
  vaccines.forEach(v => {
    const fields = [v.name, v.hospital, v.notes].filter(Boolean).join(' ').toLowerCase();
    if (fields.includes(kw)) {
      results.push({ type:'vaccine', id:v.id, title:v.name, meta:`${formatDate(v.date)}`, icon:'vaccine', data:v });
    }
  });

  // Search symptoms
  const symptoms = await dbGetAll('symptoms');
  symptoms.forEach(s => {
    const fields = [s.name, s.notes].filter(Boolean).join(' ').toLowerCase();
    if (fields.includes(kw)) {
      results.push({ type:'symptom', id:s.id, title:s.name, meta:`${formatDate(s.startDate)} 严重度${'★'.repeat(s.severity)}`, icon:'symptom', data:s });
    }
  });

  return results;
}

function renderSearchResults(results, keyword) {
  const container = document.getElementById('search-results');
  if (!results.length) {
    container.innerHTML = `<div class="empty-state" style="padding:40px"><div class="empty-desc">未找到相关记录</div></div>`;
    return;
  }

  // Group by type
  const groups = {};
  const typeLabels = { visit:'就诊记录', checkup:'检查报告', medication:'用药记录', vaccine:'疫苗记录', symptom:'症状' };
  const typeIcons = {
    visit:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>',
    checkup:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
    med:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>',
    vaccine:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
    symptom:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
  };

  results.forEach(r => {
    if (!groups[r.type]) groups[r.type] = [];
    groups[r.type].push(r);
  });

  let html = '';
  for (const type in groups) {
    html += `<div class="search-section">
      <div class="search-section-title">${typeLabels[type]||type} (${groups[type].length})</div>`;
    groups[type].forEach(r => {
      const highlightedTitle = highlightText(r.title, keyword);
      const highlightedMeta = highlightText(r.meta, keyword);
      html += `<div class="search-result-item" onclick="openSearchResult('${r.type}','${r.id}')">
        <div class="search-result-icon ${r.icon}">${typeIcons[r.icon]||''}</div>
        <div class="search-result-content">
          <div class="search-result-title">${highlightedTitle}</div>
          <div class="search-result-meta">${highlightedMeta}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function highlightText(text, keyword) {
  if (!keyword) return text;
  const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(regex, '<span class="search-highlight">$1</span>');
}

async function openSearchResult(type, id) {
  switch(type) {
    case 'visit': openVisitForm(id); break;
    case 'checkup': openCheckupForm(id); break;
    case 'medication': openMedForm(id); break;
    case 'vaccine': openVaccineForm(null, id); break;
    case 'symptom': openSymptomForm(id); break;
  }
}

function clearSearchHistory() {
  localStorage.removeItem('child_health_search_history');
  renderSearch();
}

// ==================== Config Modal ====================
function showConfigModal() {
  const cfg = getConfig();
  const html = `
  <div class="config-avatar">🧒</div>
  <div class="form-group"><label class="form-label">宝贝昵称</label><input class="form-input" id="f-cfg-name" value="${cfg.childName}" placeholder="宝贝昵称"></div>
  <div class="form-group"><label class="form-label">出生日期</label><input type="date" class="form-input" id="f-cfg-birth" value="${cfg.childBirthDate||''}"></div>
  <button class="btn btn-primary btn-block" onclick="saveConfigModal()">保存</button>
  <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
    <button class="btn btn-secondary btn-block" onclick="exportData()">导出数据</button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary btn-block" onclick="importDataClick()">导入数据</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>`;

  openFullModal('设置', html, null, null);
}

function saveConfigModal() {
  const cfg = getConfig();
  cfg.childName = document.getElementById('f-cfg-name').value.trim() || '宝贝';
  cfg.childBirthDate = document.getElementById('f-cfg-birth').value;
  saveConfig(cfg);
  closeFullModal();
  showToast('设置已保存');
  renderPage(currentPage);
}

async function exportData() {
  const data = {};
  for (const store of STORES) {
    data[store] = await dbGetAll(store);
  }
  data.config = getConfig();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `童病记_备份_${formatDate(new Date())}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importDataClick() {
  document.getElementById('import-file').click();
}

async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    for (const store of STORES) {
      if (data[store] && Array.isArray(data[store])) {
        for (const item of data[store]) {
          await dbPut(store, item);
        }
      }
    }
    if (data.config) saveConfig(data.config);
    showToast('数据导入成功');
    closeFullModal();
    renderPage(currentPage);
  } catch(err) {
    showToast('导入失败：文件格式错误');
  }
}

// ==================== PWA Service Worker ====================
const SW_CODE = `
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
